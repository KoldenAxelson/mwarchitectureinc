name = "mw-contact"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Production environment — the staging site can keep using the same Worker.
# Env vars (RESEND_API_KEY, TO_EMAIL_1, TO_EMAIL_2, FROM_EMAIL, ALLOWED_ORIGINS)
# are set via `wrangler secret put …` and the Cloudflare dashboard.
# Never commit secrets here.

[vars]
# Comma-separated list. ALLOWED_ORIGINS gets overridden in the dashboard
# once the staging + prod hostnames are pinned, but a sensible default
# stays here so local `wrangler dev` works.
ALLOWED_ORIGINS = "https://mwarchitectureinc.com,https://kul-de-sac.com,http://localhost:4321"

[observability]
enabled = true

# Limits — contact form should never hit anything close to this in real use.
[limits]
cpu_ms = 50
